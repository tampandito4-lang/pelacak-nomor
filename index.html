<!DOCTYPE html>
<html>
<head>
<title>Pelacak Nomor HP</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>Pelacak Nomor HP</h2>

<input id="nomor" placeholder="Masukkan nomor HP">

<button onclick="cek()">Cek</button>

<p id="hasil"></p>

<script>

function cek(){

let nomor=document.getElementById("nomor").value;
let hasil="Operator tidak diketahui";

if(nomor.startsWith("0811")||nomor.startsWith("0812")||nomor.startsWith("0813")){
hasil="Operator: Telkomsel";
}

if(nomor.startsWith("0857")||nomor.startsWith("0856")){
hasil="Operator: Indosat";
}

document.getElementById("hasil").innerHTML=hasil;

}

</script>

</body>
</html>
